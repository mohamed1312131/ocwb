# Server Configuration
server.port=${PORT:8080}
spring.application.name=omnicare-backend

# Database Configuration (PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://crossover.proxy.rlwy.net:40729/railway}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:gQrWGGsnvHXKmoXPyUAVHDUdWJVWPiYj}

# Connection Pool
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 Console (disabled for PostgreSQL)
spring.h2.console.enabled=false

# JWT Configuration
jwt.secret=${JWT_SECRET:omnicare-secret-key-change-this-in-production-to-a-very-long-secure-random-string}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Logging
logging.level.com.omnicare=INFO
logging.level.org.springframework.security=INFO
